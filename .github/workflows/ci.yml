name: CI Logic

on:
  push:
    branches: [ main, "andrewmc1729/*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --all-extras --dev --frozen

    - name: Lint with Ruff
      run: uv run ruff check .

    - name: Run Unit Tests
      # On lance pytest sur tout le dossier. Il ignorera test_astar.py.bak automatiquement.
      run: uv run pytest

    - name: RL Encoder Smoke Test
      run: |
        export SDL_VIDEODRIVER=dummy
        uv run scripts/check_encoder.py